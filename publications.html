        text-decoration: underline;
        transition: color 0.2s;
      }
      .content-area a:not(.no-color-override):hover {
        color: #8B4513; /* 深棕色 SaddleBrown */
      }
      .dark .content-area a:not(.no-color-override) {
        color: #D2B48C; /* 浅棕色 Tan for dark mode */
      }
      
      /* 2. 主题切换图标控制 */
      .theme-icon-sun { display: block; }

      .theme-icon-moon { display: none; }
      .dark .theme-icon-moon { display: block; }
    </style>
    <script>
      // 纯静态主题切换逻辑
      (function () {
        const root = document.documentElement;
        const storedTheme = localStorage.getItem('theme-static');
        let effectiveTheme = 'light';

        // 初始化主题
        if (storedTheme) {
            effectiveTheme = storedTheme;
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            effectiveTheme = 'dark';
        }

        if (effectiveTheme === 'dark') {
            root.classList.add('dark');
        } else {
            root.classList.remove('dark');
        }
      })();

      function toggleTheme() {
        const root = document.documentElement;
        const isDark = root.classList.contains('dark');
        
        if (isDark) {
          root.classList.remove('dark');
          localStorage.setItem('theme-static', 'light');
        } else {
          root.classList.add('dark');
          localStorage.setItem('theme-static', 'dark');
        }
      }

      window.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.theme-toggle-btn').forEach(button => {
            button.addEventListener('click', toggleTheme);
        });
      });

      function toggleMobileMenu() {
        const menu = document.getElementById('mobile-menu');
        const button = document.getElementById('mobile-menu-button');
        
        // 切换 'hidden' 类来显示或隐藏菜单
        menu.classList.toggle('hidden');
        
        // 可选：更新 aria-expanded 属性
        const isExpanded = menu.classList.contains('hidden') ? 'false' : 'true';
        button.setAttribute('aria-expanded', isExpanded);
    }

    window.addEventListener('DOMContentLoaded', () => {
        // ... (主题切换按钮的事件监听保持不变)

        // 新增：移动菜单按钮的事件监听
        const menuButton = document.getElementById('mobile-menu-button');
        if (menuButton) {
            menuButton.addEventListener('click', toggleMobileMenu);
        }
    });
    </script>

        // 渲染函数
        function renderList(containerId, papers) {
            const container = document.getElementById(containerId);
            if (!container) return;

            let html = '';
            papers.forEach(paper => {
                let tagsHtml = '';
                paper.tags.forEach(tag => {
                    tagsHtml += `<span class="inline-flex items-center px-3 py-1 rounded-md text-xs font-medium bg-accent text-white">${tag}</span>`;
                });

                let linksHtml = '';
                paper.links.forEach(link => {
                    linksHtml += `<a href="${link[1]}" target="_blank" class="inline-flex items-center px-3 py-1 rounded-md text-xs font-medium transition-colors bg-neutral-100 dark:bg-neutral-800 text-neutral-700 dark:text-neutral-300 hover:bg-accent hover:text-white">${link[0]}</a>`;
                });

                html += `
                <div class="bg-white dark:bg-neutral-900 p-6 rounded-xl shadow-sm border border-neutral-200 dark:border-neutral-800 hover:shadow-md transition-all duration-200 publication-card">
                    <h3 class="text-xl font-serif font-bold text-primary dark:text-white mb-2">${paper.title}</h3>
                    <p class="text-sm text-neutral-600 dark:text-neutral-500 mb-2">${paper.authors}</p>
                    <p class="text-sm text-neutral-500 mb-2"><em>${paper.venue}</em></p>
                    <div class="flex flex-wrap gap-2 mt-auto">
                        ${tagsHtml}
                        ${linksHtml}
                    </div>
                </div>`;
            });

            container.innerHTML = html;
        }
